{{ define "title" }}Login{{ end }}
{{ define "script-tags" }}
  <script type="module" nonce="{{ .CspNonce }}">
    const loginForm = document.getElementById("login");

    function setLoginFormState(isEnabled) {
      document.querySelectorAll("#login input").forEach((el) => {
        el.disabled = !isEnabled;
      });
    }

    function disableLoginForm() {
      setLoginFormState(false);
    }

    function enableLoginForm() {
      setLoginFormState(true);
    }

    async function login(username, password) {
      return fetch("/login", {
        method: "POST",
        mode: "same-origin",
        credentials: "include",
        cache: "no-cache",
        redirect: "error",
        body: JSON.stringify({
          username: username,
          password: password,
        }),
      }).then((response) => {
        if (!response.ok) {
          return response.text().then((error) => {
            return Promise.reject(error);
          });
        }
        return Promise.resolve();
      });
    }

    // Close button for error message
    document.getElementById("error-close").addEventListener("click", () => {
      document.getElementById("error-message").style.display = "none";
      document.getElementById("password").value = "";
    });

    loginForm.addEventListener("submit", (evt) => {
      evt.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      disableLoginForm();
      login(username, password)
        .then(() => {
          document.location = "/";
        })
        .catch((error) => {
          enableLoginForm();
          document.getElementById("error-text").textContent = error;
          document.getElementById("error-message").style.display = "flex";
        });
    });
  </script>
{{ end }}
{{ define "content" }}
  <h1>Login</h1>
  <div id="error-message" style="display: none">
    <span id="error-text"></span>
    <button id="error-close" type="button">&times;</button>
  </div>
  <form id="login">
    <label for="username">Username</label>
    <input type="text" name="username" id="username" autocomplete="username" />
    <label for="password">Password</label>
    <input type="password" name="password" id="password" autocomplete="current-password" />
    <input type="submit" value="Login" />
  </form>
{{ end }}
